<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-2: #243044;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --weekend: rgba(139, 156, 179, 0.08);
      --border: rgba(255, 255, 255, 0.06);
      --today-ring: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .legend {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 4px;
      background: var(--weekend);
      border: 1px solid var(--border);
    }

    .months-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .month-card {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .month-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .month-header {
      padding: 0.85rem 1rem;
      background: var(--surface-2);
      font-weight: 600;
      font-size: 1rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0.5rem 0.35rem 0.25rem;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      padding: 0.25rem 0.35rem 0.65rem;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 8px;
      min-height: 36px;
    }

    .day.empty { visibility: hidden; }

    .day.weekend { background: var(--weekend); }

    .day.today {
      outline: 2px solid var(--today-ring);
      outline-offset: 1px;
    }

    @media print {
      body { background: #fff; color: #111; }
      .month-card { break-inside: avoid; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Calendário 2026</h1>
    </header>

    <div class="legend">
      <span class="legend-item"><span class="legend-dot"></span> Fim de semana</span>
    </div>

    <div class="months-grid" id="calendar"></div>
  </div>

  <script>
    const WEEKDAYS = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
    const MONTHS = [
      "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
      "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
    ];

    function formatDateKey(year, month, day) {
      const m = String(month + 1).padStart(2, "0");
      const d = String(day).padStart(2, "0");
      return `${year}-${m}-${d}`;
    }

    function renderCalendar() {
      const container = document.getElementById("calendar");
      const today = new Date();
      const todayKey = formatDateKey(today.getFullYear(), today.getMonth(), today.getDate());

      for (let month = 0; month < 12; month++) {
        const firstDay = new Date(2026, month, 1).getDay();
        const daysInMonth = new Date(2026, month + 1, 0).getDate();

        const card = document.createElement("article");
        card.className = "month-card";
        card.innerHTML = `
          <div class="month-header">${MONTHS[month]} 2026</div>
          <div class="weekdays">${WEEKDAYS.map(w => `<span>${w}</span>`).join("")}</div>
          <div class="days"></div>
        `;

        const daysEl = card.querySelector(".days");

        for (let i = 0; i < firstDay; i++) {
          const empty = document.createElement("div");
          empty.className = "day empty";
          daysEl.appendChild(empty);
        }

        for (let day = 1; day <= daysInMonth; day++) {
          const key = formatDateKey(2026, month, day);
          const dow = new Date(2026, month, day).getDay();

          const cell = document.createElement("div");
          cell.className = "day";
          cell.textContent = day;

          if (dow === 0 || dow === 6) cell.classList.add("weekend");
          if (key === todayKey) cell.classList.add("today");

          daysEl.appendChild(cell);
        }

        container.appendChild(card);
      }
    }

    renderCalendar();
  </script>
</body>
</html>
